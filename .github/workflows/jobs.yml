name: Job Scraper Pipeline

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Job sources to scrape"
        required: true
        default: "linkedin"
        type: choice
        options:
          - linkedin
          - indeed
          - both

  schedule:
    # Runs once daily during the 07:00 UTC hour. Avoid minute 0 because GitHub
    # may delay or drop scheduled jobs at the top of the hour under high load.
    - cron: "17 7 * * *"

permissions:
  contents: read

concurrency:
  group: linkedin-job-scraper
  cancel-in-progress: false

jobs:
  scrape-and-evaluate:
    name: Scrape and evaluate jobs
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      JOB_KEYWORDS_TEXT: ${{ secrets.JOB_KEYWORDS_TEXT }}
      MASTER_PROMPT_TEXT: ${{ secrets.MASTER_PROMPT_TEXT }}
      MASTER_CV_TEX: ${{ secrets.MASTER_CV_TEX }}
      JOBSCRAPER_OUTPUT_MODE: "google_sheets"
      JOBSCRAPER_SOURCES: ${{ github.event.inputs.sources || 'linkedin' }}
      JOBSCRAPER_SEARCH_CONCURRENCY: "15"
      JOBSCRAPER_SEARCH_WINDOW_BUFFER_SECONDS: "3600"
      APIFY_RUN_MEMORY_MB: "512"
      APIFY_RUN_TIMEOUT_SECONDS: "300"
      JOBSCRAPER_DELAY_BETWEEN_REQUESTS: "0"
      JOBSCRAPER_SCRAPE_COMPANY_DETAILS: "false"
      JOBSCRAPER_TIMEZONE: Europe/Berlin
      JOBSCRAPER_POSTED_TIMEZONE: Europe/Berlin
      JOB_EVAL_OPENAI_MODEL: "gpt-5-mini"
      JOB_EVAL_CONCURRENCY: "8"
      JOB_EVAL_BATCH_SIZE: "40"
      JOB_EVAL_LARGE_QUEUE_THRESHOLD: "200"
      JOB_EVAL_LARGE_QUEUE_SLEEP_MS: "2000"
      PYTHONUNBUFFERED: "1"
      TZ: Europe/Berlin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${APIFY_API_TOKEN}" ]; then
            echo "::error::Missing repository secret APIFY_API_TOKEN."
            missing=1
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::Missing repository secret OPENAI_API_KEY."
            missing=1
          fi

          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::error::Missing repository secret GOOGLE_SERVICE_ACCOUNT_JSON. Paste the full service-account JSON key into this secret."
            missing=1
          fi

          if [ -z "${GOOGLE_SPREADSHEET_ID}" ]; then
            echo "::error::Missing repository secret GOOGLE_SPREADSHEET_ID. GitHub Actions runners are temporary, so the spreadsheet ID must be saved as a secret."
            missing=1
          fi

          if [ -z "${JOB_KEYWORDS_TEXT}" ]; then
            echo "::error::Missing repository secret JOB_KEYWORDS_TEXT."
            missing=1
          fi

          if [ -z "${MASTER_PROMPT_TEXT}" ]; then
            echo "::error::Missing repository secret MASTER_PROMPT_TEXT."
            missing=1
          fi

          if [ -z "${MASTER_CV_TEX}" ]; then
            echo "::error::Missing repository secret MASTER_CV_TEX."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write private input files
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          private_files = {
              Path("configs/keywords.txt"): os.environ["JOB_KEYWORDS_TEXT"],
              Path("prompts/master_prompt.txt"): os.environ["MASTER_PROMPT_TEXT"],
              Path("cv/master_cv.tex"): os.environ["MASTER_CV_TEX"],
          }

          for path, value in private_files.items():
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(value.strip() + "\n", encoding="utf-8")
          PY

      - name: Write Google credential files
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          import json
          import sys

          service_account_json = os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"].strip()
          spreadsheet_id = os.environ.get("GOOGLE_SPREADSHEET_ID", "").strip()

          try:
              credentials = json.loads(service_account_json)
          except json.JSONDecodeError as exc:
              print(f"::error::GOOGLE_SERVICE_ACCOUNT_JSON is not valid JSON: {exc}")
              sys.exit(1)

          if credentials.get("type") != "service_account":
              print("::error::GOOGLE_SERVICE_ACCOUNT_JSON must be a service-account key JSON.")
              sys.exit(1)

          Path("google_service_account.json").write_text(
              service_account_json, encoding="utf-8"
          )

          if spreadsheet_id:
              Path("google_spreadsheet_id.txt").write_text(spreadsheet_id, encoding="utf-8")
          PY

          chmod 600 google_service_account.json

          if [ -f google_spreadsheet_id.txt ]; then
            chmod 600 google_spreadsheet_id.txt
          fi

      - name: Run scraper and evaluator pipeline
        shell: bash
        run: |
          set -o pipefail

          echo "Starting Job Scraper Pipeline at $(date +'%Y-%m-%dT%H:%M:%S%z') (${TZ})"
          echo "Output mode: ${JOBSCRAPER_OUTPUT_MODE}"
          echo "Job sources: ${JOBSCRAPER_SOURCES}"
          echo "Scraper timezone: ${JOBSCRAPER_TIMEZONE}"
          echo "Posted timezone: ${JOBSCRAPER_POSTED_TIMEZONE}"
          echo "Search concurrency: ${JOBSCRAPER_SEARCH_CONCURRENCY}"
          echo "Search window buffer: ${JOBSCRAPER_SEARCH_WINDOW_BUFFER_SECONDS}s"
          echo "Apify child run memory: ${APIFY_RUN_MEMORY_MB} MB"
          echo "Evaluator model: ${JOB_EVAL_OPENAI_MODEL}"
          echo "Evaluator concurrency: ${JOB_EVAL_CONCURRENCY}"

          python -u run_job_pipeline.py 2>&1 | tee pipeline.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            echo "::error::run_job_pipeline.py failed with exit code ${status}."
            exit "$status"
          fi

          echo "Pipeline finished successfully."

      - name: Print spreadsheet hint
        if: always()
        shell: bash
        run: |
          if [ -f google_spreadsheet_id.txt ]; then
            echo "Spreadsheet ID used by this run:"
            cat google_spreadsheet_id.txt
          else
            echo "No google_spreadsheet_id.txt was created."
          fi
