name: Job Scraper

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Job sources to scrape"
        required: true
        default: "linkedin"
        type: choice
        options:
          - linkedin
          - indeed
          - both

  schedule:
    # Runs once daily during the 07:00 UTC hour. Avoid minute 0 because GitHub
    # may delay or drop scheduled jobs at the top of the hour under high load.
    - cron: "17 7 * * *"

permissions:
  contents: read

concurrency:
  group: linkedin-job-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape jobs
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      JOBSCRAPER_OUTPUT_MODE: "google_sheets"
      JOBSCRAPER_SOURCES: ${{ github.event.inputs.sources || 'linkedin' }}
      JOBSCRAPER_SEARCH_CONCURRENCY: "15"
      APIFY_RUN_MEMORY_MB: "512"
      APIFY_RUN_TIMEOUT_SECONDS: "300"
      JOBSCRAPER_DELAY_BETWEEN_REQUESTS: "0"
      JOBSCRAPER_SCRAPE_COMPANY_DETAILS: "false"
      JOBSCRAPER_TIMEZONE: Europe/Berlin
      JOBSCRAPER_POSTED_TIMEZONE: Europe/Berlin
      PYTHONUNBUFFERED: "1"
      TZ: Europe/Berlin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${APIFY_API_TOKEN}" ]; then
            echo "::error::Missing repository secret APIFY_API_TOKEN."
            missing=1
          fi

          if [ -z "${GOOGLE_TOKEN_JSON}" ]; then
            echo "::error::Missing repository secret GOOGLE_TOKEN_JSON. GitHub Actions cannot complete browser-based Google OAuth."
            missing=1
          fi

          if [ -z "${GOOGLE_SPREADSHEET_ID}" ]; then
            echo "::error::Missing repository secret GOOGLE_SPREADSHEET_ID. GitHub Actions runners are temporary, so the spreadsheet ID must be saved as a secret."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write Google credential files
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          token_json = os.environ["GOOGLE_TOKEN_JSON"].strip()
          spreadsheet_id = os.environ.get("GOOGLE_SPREADSHEET_ID", "").strip()

          Path("google_token.json").write_text(token_json, encoding="utf-8")

          if spreadsheet_id:
              Path("google_spreadsheet_id.txt").write_text(spreadsheet_id, encoding="utf-8")
          PY

          chmod 600 google_token.json

          if [ -f google_spreadsheet_id.txt ]; then
            chmod 600 google_spreadsheet_id.txt
          fi

      - name: Run scraper
        shell: bash
        run: |
          set -o pipefail

          echo "Starting Job Scraper at $(date +'%Y-%m-%dT%H:%M:%S%z') (${TZ})"
          echo "Output mode: ${JOBSCRAPER_OUTPUT_MODE}"
          echo "Job sources: ${JOBSCRAPER_SOURCES}"
          echo "Scraper timezone: ${JOBSCRAPER_TIMEZONE}"
          echo "Posted timezone: ${JOBSCRAPER_POSTED_TIMEZONE}"
          echo "Search concurrency: ${JOBSCRAPER_SEARCH_CONCURRENCY}"
          echo "Apify child run memory: ${APIFY_RUN_MEMORY_MB} MB"

          python - <<'PY'
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          local_time = datetime.now(timezone.utc).astimezone(ZoneInfo("Europe/Berlin"))
          print("Python Europe/Berlin time check:", local_time.strftime("%Y-%m-%d %H:%M:%S %Z"))
          PY

          python -u linkedin_job_scraper.py 2>&1 | tee scraper.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            echo "::error::linkedin_job_scraper.py failed with exit code ${status}."
            exit "$status"
          fi

          echo "Scraper finished successfully."

      - name: Print spreadsheet hint
        if: always()
        shell: bash
        run: |
          if [ -f google_spreadsheet_id.txt ]; then
            echo "Spreadsheet ID used by this run:"
            cat google_spreadsheet_id.txt
          else
            echo "No google_spreadsheet_id.txt was created."
          fi
