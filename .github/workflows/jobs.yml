name: Job Scraper

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Job sources to scrape"
        required: true
        default: "linkedin"
        type: choice
        options:
          - linkedin
          - indeed
          - both
      output_mode:
        description: "Where to save results"
        required: true
        default: "google_sheets"
        type: choice
        options:
          - google_sheets
          - excel
          - both
  schedule:
    # GitHub cron is UTC. These two entries cover Europe/Rome DST changes:
    # - 08:00 UTC = 10:00 Europe/Rome during CEST
    # - 09:00 UTC = 10:00 Europe/Rome during CET
    # The guard step below allows only the run where Europe/Rome local hour is 10.
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"

permissions:
  contents: read

concurrency:
  group: linkedin-job-scraper
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape jobs
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      JOBSCRAPER_OUTPUT_MODE: ${{ github.event.inputs.output_mode || 'google_sheets' }}
      JOBSCRAPER_SOURCES: ${{ github.event.inputs.sources || 'linkedin' }}
      JOBSCRAPER_SEARCH_CONCURRENCY: "8"
      APIFY_RUN_MEMORY_MB: "1024"
      APIFY_RUN_TIMEOUT_SECONDS: "300"
      JOBSCRAPER_DELAY_BETWEEN_REQUESTS: "0"
      JOBSCRAPER_SCRAPE_COMPANY_DETAILS: "false"
      JOBSCRAPER_TIMEZONE: Europe/Rome
      JOBSCRAPER_POSTED_TIMEZONE: Europe/Berlin
      PYTHONUNBUFFERED: "1"
      TZ: Europe/Rome

    steps:
      - name: Check Europe/Rome run window
        id: schedule_guard
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run requested."
            exit 0
          fi

          europe_time="$(TZ=Europe/Rome date +'%Y-%m-%d %H:%M:%S %Z')"
          europe_hour="$(TZ=Europe/Rome date +'%H')"

          echo "Current Europe/Rome time: ${europe_time}"

          if [ "${europe_hour}" = "10" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Inside the 10:00 Europe/Rome run window."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Outside the 10:00 Europe/Rome run window. Skipping scraper."
          fi

      - name: Checkout repository
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        if: steps.schedule_guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${APIFY_API_TOKEN}" ]; then
            echo "::error::Missing repository secret APIFY_API_TOKEN."
            missing=1
          fi

          needs_google="false"
          if [ "${JOBSCRAPER_OUTPUT_MODE}" = "google_sheets" ] || [ "${JOBSCRAPER_OUTPUT_MODE}" = "both" ]; then
            needs_google="true"
          fi

          if [ "${needs_google}" = "true" ] && [ -z "${GOOGLE_TOKEN_JSON}" ]; then
            echo "::error::Missing repository secret GOOGLE_TOKEN_JSON. GitHub Actions cannot complete browser-based Google OAuth."
            missing=1
          fi

          if [ "${needs_google}" = "true" ] && [ -z "${GOOGLE_SPREADSHEET_ID}" ]; then
            echo "::warning::GOOGLE_SPREADSHEET_ID is not set. The script can create a new spreadsheet, but a persistent secret is recommended."
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write Google credential files
        if: steps.schedule_guard.outputs.should_run == 'true' && env.JOBSCRAPER_OUTPUT_MODE != 'excel'
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pathlib import Path

          token_json = os.environ["GOOGLE_TOKEN_JSON"].strip()
          spreadsheet_id = os.environ.get("GOOGLE_SPREADSHEET_ID", "").strip()

          Path("google_token.json").write_text(token_json, encoding="utf-8")

          if spreadsheet_id:
              Path("google_spreadsheet_id.txt").write_text(spreadsheet_id, encoding="utf-8")
          PY

          chmod 600 google_token.json

          if [ -f google_spreadsheet_id.txt ]; then
            chmod 600 google_spreadsheet_id.txt
          fi

      - name: Run scraper
        if: steps.schedule_guard.outputs.should_run == 'true'
        shell: bash
        run: |
          set -o pipefail

          echo "Starting Job Scraper at $(date +'%Y-%m-%dT%H:%M:%S%z') (${TZ})"
          echo "Output mode: ${JOBSCRAPER_OUTPUT_MODE}"
          echo "Job sources: ${JOBSCRAPER_SOURCES}"
          echo "Scraper timezone: ${JOBSCRAPER_TIMEZONE}"

          python - <<'PY'
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          local_time = datetime.now(timezone.utc).astimezone(ZoneInfo("Europe/Rome"))
          print("Python Europe/Rome time check:", local_time.strftime("%Y-%m-%d %H:%M:%S %Z"))
          PY

          python -u linkedin_job_scraper.py 2>&1 | tee scraper.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            echo "::error::linkedin_job_scraper.py failed with exit code ${status}."
            exit "$status"
          fi

          echo "Scraper finished successfully."

      - name: Upload Excel artifact
        if: always() && steps.schedule_guard.outputs.should_run == 'true' && env.JOBSCRAPER_OUTPUT_MODE != 'google_sheets'
        uses: actions/upload-artifact@v4
        with:
          name: jobs-xlsx-${{ github.run_id }}
          path: jobs.xlsx
          if-no-files-found: warn

      - name: Print spreadsheet hint
        if: always() && steps.schedule_guard.outputs.should_run == 'true' && env.JOBSCRAPER_OUTPUT_MODE != 'excel'
        shell: bash
        run: |
          if [ -f google_spreadsheet_id.txt ]; then
            echo "Spreadsheet ID used by this run:"
            cat google_spreadsheet_id.txt
          else
            echo "No google_spreadsheet_id.txt was created."
          fi
